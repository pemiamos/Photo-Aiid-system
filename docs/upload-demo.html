<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>《三峡画册》照片征稿 · 摄影师上传</title>
<style>
  :root{
    --bg:#f5f5f4; --card:#fff; --line:#e5e4e1; --line2:#d6d4cf;
    --text:#1f1f1d; --muted:#6b6a64; --hint:#9a988f;
    --info:#185fa5; --info-bg:#e6f1fb; --info-dk:#0c447c; --ok:#0f6e56; --err:#a32d2d;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.6;padding:32px 16px;}
  .wrap{max-width:600px;margin:0 auto;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px 28px;}
  .title{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:600;}
  .sub{font-size:13px;color:var(--muted);margin:4px 0 18px;}
  input[type=text]{border:1px solid var(--line2);border-radius:8px;padding:9px 11px;
    font-size:14px;font-family:inherit;background:#fff;}
  input[type=text]:focus{outline:none;border-color:var(--info);box-shadow:0 0 0 3px var(--info-bg);}
  .code-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;}
  .code-row input{width:100px;text-transform:uppercase;font-weight:600;letter-spacing:1px;}
  .ok{font-size:13px;color:var(--ok);}
  .drop{border:1.5px dashed var(--line2);border-radius:8px;padding:16px;text-align:center;
    cursor:pointer;margin-bottom:12px;transition:border-color .15s;font-size:13px;color:var(--muted);}
  .drop:hover{border-color:var(--info);}
  .drop .ic{font-size:24px;}
  /* 批量标注工具条 */
  .tools{display:flex;align-items:center;gap:8px;background:var(--info-bg);border-radius:8px;
    padding:8px 10px;margin-bottom:12px;}
  .tools .sel{font-size:13px;color:var(--info-dk);white-space:nowrap;}
  .tools input{flex:1;height:34px;}
  .tools button{white-space:nowrap;padding:6px 14px;border:none;border-radius:7px;
    background:var(--info);color:#fff;font-size:13px;cursor:pointer;}
  .tools button:disabled{background:var(--line2);color:var(--hint);cursor:not-allowed;}
  /* 照片网格 */
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
  .thumb{border:2px solid transparent;border-radius:8px;overflow:hidden;cursor:pointer;
    border-color:var(--line);transition:border-color .12s;}
  .thumb.sel{border-color:var(--info);}
  .thumb .img{height:60px;background:var(--bg);display:flex;align-items:center;justify-content:center;
    position:relative;font-size:22px;color:var(--hint);}
  .thumb .ck{position:absolute;top:3px;left:4px;font-size:14px;color:var(--info);display:none;}
  .thumb.sel .ck{display:block;}
  .thumb .lbl{padding:4px 6px;font-size:11px;line-height:1.3;}
  .thumb .lbl.todo{color:var(--err);}
  .thumb .lbl.done{color:var(--ok);}
  .agree{display:flex;gap:8px;align-items:flex-start;font-size:13px;color:var(--muted);margin:6px 0 16px;line-height:1.5;}
  .submit{width:100%;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:600;}
  .submit.ready{background:var(--info);color:#fff;cursor:pointer;}
  .submit.ready:hover{background:#134e89;}
  .submit.block{background:var(--bg);color:var(--hint);border:1px solid var(--line);cursor:not-allowed;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title"><span>📷</span>《三峡画册》照片征稿</div>
    <p class="sub">先把照片全部拖进来，再框选同类照片批量标注内容。所有照片标注完才能提交。</p>

    <div class="code-row">
      <input type="text" id="code" value="A01" placeholder="投稿码" />
      <span class="ok">✓ 欢迎回来，张伟 · 已交 2 批 58 张</span>
    </div>

    <div class="drop" id="drop"><div class="ic">☁️</div>点击或拖拽照片到此处</div>

    <div class="tools">
      <span class="sel" id="selCount">已选 0 张</span>
      <input type="text" id="labelInput" placeholder="输入内容标注，如：夔门日出" />
      <button id="applyBtn" disabled>批量标注</button>
    </div>

    <div class="grid" id="grid"></div>

    <label class="agree">
      <input type="checkbox" checked />
      <span>本人确认拥有所提交照片的完整著作权，并授权出版方在本书及相关宣传中使用。授权时间将被记录存档。</span>
    </label>

    <button class="submit block" id="submit" disabled>请先拉入照片</button>
  </div>
</div>

<script>
  // 原型演示：拉入照片 → 多选 → 批量标注内容 → 全部标注后才能提交。
  // 真实版本：照片为本地选中的文件缩略图；标注写入 submission_files.content_label（NOT NULL，强制）；
  // 上传走 OSS 前端 SDK 分片直传，文件按标注归档到 {书}/{投稿码}/{标注}/ 前缀。
  var demoNames=['DSC_0012.NEF','DSC_0013.NEF','SUNRISE_01.ARW','IMG_3340.JPG','IMG_3341.JPG','_8890.CR2'];
  var photos=demoNames.map(function(n,i){return{id:i,name:n,label:'',sel:false};});

  var grid=document.getElementById('grid'),selCount=document.getElementById('selCount'),
      applyBtn=document.getElementById('applyBtn'),labelInput=document.getElementById('labelInput'),
      submit=document.getElementById('submit'),drop=document.getElementById('drop');

  function render(){
    grid.innerHTML='';
    photos.forEach(function(p){
      var d=document.createElement('div');
      d.className='thumb'+(p.sel?' sel':'');
      d.innerHTML='<div class="img">🖼️<span class="ck">✔</span></div>'+
        '<div class="lbl '+(p.label?'done':'todo')+'">'+(p.label||'未标注')+'</div>';
      d.onclick=function(){p.sel=!p.sel;render();};
      grid.appendChild(d);
    });
    var selected=photos.filter(function(p){return p.sel;}).length;
    var todo=photos.filter(function(p){return !p.label;}).length;
    selCount.textContent='已选 '+selected+' 张';
    applyBtn.disabled=selected===0||!labelInput.value.trim();
    if(photos.length===0){submit.className='submit block';submit.textContent='请先拉入照片';submit.disabled=true;}
    else if(todo>0){submit.className='submit block';submit.textContent='还有 '+todo+' 张未标注，无法提交';submit.disabled=true;}
    else{submit.className='submit ready';submit.textContent='提交本次投稿（'+photos.length+' 张）';submit.disabled=false;}
  }
  labelInput.addEventListener('input',render);
  applyBtn.addEventListener('click',function(){
    var v=labelInput.value.trim();if(!v)return;
    photos.forEach(function(p){if(p.sel){p.label=v;p.sel=false;}});
    labelInput.value='';render();
  });
  drop.addEventListener('click',function(){  // 演示：每次点击模拟再拉入 2 张
    var base=photos.length;
    photos.push({id:base,name:'NEW_'+base+'.JPG',label:'',sel:false});
    photos.push({id:base+1,name:'NEW_'+(base+1)+'.JPG',label:'',sel:false});
    render();
  });
  render();
</script>
</body>
</html>
